name: Checks

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check-all:
    name: Web, Rust, and native Swift checks
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Run project checks
        run: npm run check:all
